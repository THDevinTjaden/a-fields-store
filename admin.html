<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin panel for Ashley Fields - Manage your products and inventory">
    <title>Admin Panel - Ashley Fields</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-panel {
            padding: var(--spacing-3xl) 0;
            background-color: var(--background-secondary);
            min-height: 100vh;
        }
        
        .admin-header {
            background-color: var(--primary-color);
            color: white;
            padding: var(--spacing-2xl) 0;
            margin-bottom: var(--spacing-3xl);
        }
        
        .admin-nav {
            display: flex;
            gap: var(--spacing-lg);
            margin-top: var(--spacing-lg);
        }
        
        .admin-nav a {
            color: white;
            text-decoration: none;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            transition: background-color var(--transition-fast);
        }
        
        .admin-nav a:hover,
        .admin-nav a.active {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .admin-card {
            background-color: white;
            border-radius: var(--radius-lg);
            padding: var(--spacing-2xl);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--spacing-2xl);
        }
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-3xl);
        }
        
        .stat-card {
            background-color: white;
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            text-align: center;
        }
        
        .stat-number {
            font-size: var(--font-size-3xl);
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: var(--spacing-sm);
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
        }
        
        .product-form {
            display: grid;
            gap: var(--spacing-lg);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Admin Header -->
    <header class="admin-header">
        <div class="container">
            <h1>Ashley Fields Admin Panel</h1>
            <p>Manage your products and inventory</p>
            <nav class="admin-nav">
                <a href="#dashboard" class="active">Dashboard</a>
                <a href="#products">Products</a>
                <a href="#orders">Orders</a>
                <a href="../index.html">View Store</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="admin-panel">
        <div class="container">
            <!-- Dashboard Section -->
            <section id="dashboard">
                <h2>Dashboard</h2>
                
                <!-- Stats Cards -->
                <div class="admin-stats">
                    <div class="stat-card">
                        <div class="stat-number" id="total-products">0</div>
                        <div class="stat-label">Total Products</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="low-stock">0</div>
                        <div class="stat-label">Low Stock Items</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="out-of-stock">0</div>
                        <div class="stat-label">Out of Stock</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="total-categories">0</div>
                        <div class="stat-label">Categories</div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="admin-card">
                    <h3>Quick Actions</h3>
                    <div style="display: flex; gap: var(--spacing-md); flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="showAddProductForm()">Add New Product</button>
                        <button class="btn btn-secondary" onclick="refreshProducts()">Refresh Products</button>
                        <button class="btn btn-secondary" onclick="exportProducts()">Export Products</button>
                    </div>
                </div>

                <!-- Recent Products -->
                <div class="admin-card">
                    <h3>Recent Products</h3>
                    <div id="recent-products">
                        <p>Loading products...</p>
                    </div>
                </div>
            </section>

            <!-- Add Product Form -->
            <section id="add-product" style="display: none;">
                <div class="admin-card">
                    <h3>Add New Product</h3>
                    <form id="product-form" class="product-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="product-name">Product Name *</label>
                                <input type="text" id="product-name" name="name" required>
                            </div>
                            <div class="form-group">
                                <label for="product-id">Product ID *</label>
                                <input type="text" id="product-id" name="id" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="product-description">Description *</label>
                            <textarea id="product-description" name="description" rows="4" required></textarea>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="product-price">Price *</label>
                                <input type="number" id="product-price" name="price" step="0.01" min="0" required>
                            </div>
                            <div class="form-group">
                                <label for="product-stock">Stock Quantity *</label>
                                <input type="number" id="product-stock" name="stock" min="0" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="product-category">Category</label>
                                <select id="product-category" name="category">
                                    <option value="">Select Category</option>
                                    <option value="home">Home</option>
                                    <option value="kitchen">Kitchen</option>
                                    <option value="wellness">Wellness</option>
                                    <option value="beverages">Beverages</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="product-image">Image URL</label>
                                <input type="url" id="product-image" name="image" placeholder="https://example.com/image.jpg">
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: var(--spacing-md);">
                            <button type="submit" class="btn btn-primary">Add Product</button>
                            <button type="button" class="btn btn-secondary" onclick="hideAddProductForm()">Cancel</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <!-- Scripts -->
    <script src="./js/admin.js"></script>

    <!-- Snipcart Configuration -->
    <script>
        window.SnipcartSettings = {
            publicApiKey: 'MmNmYmQzNmUtY2E3MC00NjgxLWI0M2MtMGU3OGQ3YmRiYWRhNjM4ODYwNTY1ODUxOTM0NzYx',
            loadStrategy: 'on-user-interaction',
            addProductBehavior: 'none',
            modalStyle: 'side',
            currency: 'usd',
            language: 'en'
        };
    </script>
    
    <!-- Snipcart -->
    <script async src="https://cdn.snipcart.com/themes/v3.4.1/default/snipcart.js"></script>
</body>
</html>
