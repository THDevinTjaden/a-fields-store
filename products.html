<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse our complete collection of curated products at Ashley Fields. From home essentials to lifestyle products, find everything you need.">
    <meta name="keywords" content="Ashley Fields, products, shop, online store, home essentials, lifestyle products">
    <meta property="og:title" content="Products - Ashley Fields">
    <meta property="og:description" content="Browse our complete collection of curated products at Ashley Fields.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-domain.com/products.html">
    <title>Products - Ashley Fields</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script async src="https://cdn.snipcart.com/themes/v3.4.1/default/snipcart.js"></script>
    <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.4.1/default/snipcart.css" />
</head>
<body>
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Navbar Component Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <main id="main-content">
        <!-- Page Header -->
        <section class="page-header">
            <div class="container">
                <div class="page-header-content">
                    <h1 class="page-title">Our Products</h1>
                    <p class="page-subtitle">Discover our carefully curated collection of lifestyle products</p>
                </div>
            </div>
        </section>

        <!-- Products Section -->
        <section class="products-page">
            <div class="container">
                <!-- Filter and Sort Options -->
                <div class="products-controls">
                    <div class="products-count">
                        <span id="products-count">0</span> products available
                    </div>
                    <div class="products-sort">
                        <label for="sort-select">Sort by:</label>
                        <select id="sort-select" class="sort-select">
                            <option value="featured">Featured</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="name">Name: A to Z</option>
                            <option value="stock">Stock: High to Low</option>
                        </select>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="products-grid" id="products-grid">
                    <!-- Products will be loaded dynamically -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Component Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Snipcart Configuration -->
    <script>
        window.SnipcartSettings = {
            publicApiKey: 'MmNmYmQzNmUtY2E3MC00NjgxLWI0M2MtMGU3OGQ3YmRiYWRhNjM4ODYwNTY1ODUxOTM0NzYx',
            loadStrategy: 'on-user-interaction',
            addProductBehavior: 'none',
            modalStyle: 'side',
            currency: 'usd',
            language: 'en'
        };
    </script>
    
    <!-- Snipcart -->
    <script async src="https://cdn.snipcart.com/themes/v3.4.1/default/snipcart.js"></script>

    <!-- Scripts -->
    <script src="./js/components.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/snipcart-products.js"></script>
</body>
</html>
